
; Base environments

; ESP32 based modules
[esp32]
  extends = env
  build_flags =
    ${env.build_flags}
    -D ESP32

; ESP32-C6 based modules
[esp32c6]
  extends = env
  build_flags =
    ${env.build_flags}
    -D ESP32C6

; ESP32-S2 based modules
[esp32s2]
  extends = env
  build_flags =
    ${env.build_flags}
    -D ESP32S2

; ESP32-S3 based modules
[esp32s3]
  extends = env
  build_flags =
    ${env.build_flags}
    -D ESP32S3

; ESP32-P4 based modules
[esp32p4]
  extends = env
  build_flags =
    ${env.build_flags}
    -D ESP32P4