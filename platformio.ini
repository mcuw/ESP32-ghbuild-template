; https://docs.platformio.org/en/latest/platforms/espressif32.html

[platformio]
boards_dir = ./boards
; uncomment to build an example
; src_dir = ./examples/blink
; src_dir = ./examples/low-energy-consumption
; src_dir = ./examples/esp-now-le

[env]
build_flags =
    ; to use e.g. as part of the firmware name 
    '-DPIOENV="${PIOENV}"'
 
    ; coding_standards
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wunreachable-code

    ; debug level 5=VERBOSE https://docs.platformio.org/en/latest/platforms/espressif32.html#debug-level
    ;  -DCORE_DEBUG_LEVEL=5

    ; config flags, e.g. to enable features in a config.h
    -I lib/config
extra_scripts = pre:extra_script.py
framework = arduino
lib_deps =
  ; RadioLib - LoRa library
  ; releases https://github.com/jgromes/RadioLib/releases
  jgromes/RadioLib @ ^7.6.0
  ; button handling library, used e.g. in TTGO T-Beam
  mathertel/OneButton @ ^2.6.2
  ; XPowersLib - power management series library for ESP32, including PSRAM power management
  lewisxhe/XPowersLib @ ^0.3.3
  ; OLED driver for SSD1306 displays, used e.g. in TTGO Lora32 v1.6.1
  thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays @ ^4.6.2
  ; place global libs here or under extra.lib_deps_external (see below)
monitor_speed = 115200

upload_speed = 921600
; uncomment and configure when you have multiple ESPs connected
; upload_port = /dev/tty.usbserial-...
; monitor_port = /dev/tty.usbserial-...

; CUSTOM options
; You need manually inject these options into a section
; using ${extra.<name_of_option>} (see below)
[extra]
; https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-guides/external-ram.html
; optional flags only needed for base esp32 boards
; specific boards or boards under the /boards directory are already configured with psram support
build_flags_psram =
    -DBOARD_HAS_PSRAM=1
    -mfix-esp32-psram-cache-issue ; https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-guides/external-ram.html#esp32-rev-v1
lib_deps_builtin =
  SPI
  Wire
lib_deps_external =
    ; extend libs for all platforms here

; base envs for different ESP32 based modules,
; extend build_flags and lib_deps here and they will be inherited by the specific module envs below
[esp32]
; see pioarduino versions: https://github.com/pioarduino/platform-espressif32/releases
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
; or use platformio, versions: https://github.com/platformio/platform-espressif32/releases
; platform = espressif32@6.13.0
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ${extra.lib_deps_external}
    ; extend libs only for esp32 based modules here
; Possible values: "littlefs", "spiffs", "fatfs"
board_build.filesystem = littlefs

; base envs for different ESP32-C6 based modules,
; extend build_flags and lib_deps here and they will be inherited by the specific module envs below
[esp32c6]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ${extra.lib_deps_external}
    ; extend libs only for esp32c6 based modules here
; Use pioarduino, a community compatible fork of Platformio supporting latest espressif Arduino core
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

; base envs for different ESP32-S2 based modules,
; extend build_flags and lib_deps here and they will be inherited by the specific module envs below
[esp32s2]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ${extra.lib_deps_external}
    ; extend libs only for esp32s2 based modules here

; base envs for different ESP32-S3 based modules,
; extend build_flags and lib_deps here and they will be inherited by the specific module envs below
[esp32s3]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ${extra.lib_deps_external}
    ; extend libs only for esp32s3 based modules here

; base envs for different ESP32-P4 based modules,
; extend build_flags and lib_deps here and they will be inherited by the specific module envs below
[esp32p4]
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ${extra.lib_deps_external}
    ; extend libs only for esp32p4 based modules here


; *********
; * ESP32 *
; *********

; pio board config: https://docs.platformio.org/en/latest/platforms/espressif32.html
[env:esp32dev]
extends = esp32
board = esp32dev
build_flags =
    ${esp32.build_flags}
lib_deps =
    ${esp32.lib_deps}

; pio board config: https://docs.platformio.org/en/latest/boards/espressif32/lolin32.html
[env:lolin32]
extends = esp32
board = lolin32
build_flags =
    ${esp32.build_flags}
lib_deps =
    ${esp32.lib_deps}

; Wemos https://www.wemos.cc/en/latest/d32/d32_pro.html
; pio board config: https://docs.platformio.org/en/latest/boards/espressif32/lolin_d32_pro.html
[env:lolin-d32-pro]
extends = esp32
board = lolin_d32_pro
build_flags =
    ${esp32.build_flags}
    ${extra.build_flags_psram} ; 4MB PSRAM
lib_deps =
    ${esp32.lib_deps}

[env:ttgo_t_beam_v0_7]
extends = esp32
board = ttgo-t-beam
build_flags =
  ${esp32.build_flags}
  ${extra.build_flags_psram} ; 8MB PSRAM
  -D HAS_BUTTON
  -D HAS_LED
  -D HAS_GPS
  -D USE_SX1276
board_build.partitions = huge_app.csv
board_build.variant = ${PIOENV}
board_build.variants_dir = variants
lib_deps =
  ${esp32.lib_deps}

; LILYGO https://www.lilygo.cc/products/t-beam-v1-1-esp32-lora-module
[env:ttgo_t_beam_v1_1]
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
extends = esp32
board = esp32dev
platform = ${esp32.platform}
lib_deps =
  ${esp32.lib_deps}
board_build.partitions = huge_app.csv
board_build.variant = ${PIOENV}
board_build.variants_dir = variants
build_flags =
  ${esp32.build_flags}
  ${extra.build_flags_psram} ; 8MB PSRAM
  -D HAS_BUTTON
  -D HAS_PMU
  -D HAS_GPS
  -D USE_SX1262

; https://lilygo.cc/products/lora3
; https://github.com/Xinyuan-LilyGO/LilyGo-LoRa-Series/blob/master/docs/en/t3_v161_sx1276/t3_v161_sx1276_hw.md
; pio board config: https://docs.platformio.org/en/latest/boards/espressif32/ttgo-lora32-v1.html
[env:ttgo_lora32_v1_6_1]
extends = esp32
board = ttgo-lora32-v1
board_build.partitions = huge_app.csv
board_build.variant = ${PIOENV}
board_build.variants_dir = variants
build_flags =
  ${esp32.build_flags}
  -D HAS_DISPLAY_SSD1306
  -D HAS_LED
  ; -D HIDE_SPLASH_SCREEN
  -D USE_SX1276
lib_deps =
  ${esp32.lib_deps}

